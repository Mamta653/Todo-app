<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mamta's Todo List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border-t-8 border-violet-500">
        <div class="flex items-center justify-between mb-6">

        <h1 class="text-3xl font-bold text-gray-800">ToDo App</h1>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-violet-500" viewBox="0 0 24 24" fill="currentColor">
                <path d="M22 6.5C22 7.32843 21.3284 8 20.5 8C19.6716 8 19 7.32843 19 6.5C19 5.67157 19.6716 5 20.5 5C21.3284 5 22 5.67157 22 6.5ZM16.5 12C17.3284 12 18 11.3284 18 10.5C18 9.67157 17.3284 9 16.5 9C15.6716 9 15 9.67157 15 10.5C15 11.3284 15.6716 12 16.5 12ZM20 18.5C20 19.3284 19.3284 20 18.5 20C17.6716 20 17 19.3284 17 18.5C17 17.6716 17.6716 17 18.5 17C19.3284 17 20 17.6716 20 18.5ZM12 4H4C2.89543 4 2 4.89543 2 6V18C2 19.1046 2.89543 20 4 20H12C13.1046 20 14 19.1046 14 18V6C14 4.89543 13.1046 4 12 4ZM4 6H12V18H4V6Z" />
            </svg>
        </div>

        <div class="flex items-center mb-6 space-x-2 w-full">
            
            <input type ="text" id="todo-input" placeholder=" Got something to do? Add it here! "
            class="flex-grow p-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-violet-500 transition duration-200">


            <button id="add-btn" class="bg-violet-500 text-white p-3 rounded-xl shadow-lg transition duration-200 hover:bg-violet-600 focus:outline-none focus:ring-2 focus:ring-violet-500"> 
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 4V20M4 12H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
        </button>
        </div>
        <ul id="todo-list" class="space-y-3">

        </ul>
    </div> 
    <script>
    const todoInput = document.getElementById('todo-input');
    const addButton = document.getElementById('add-btn');
    const todoList = document.getElementById('todo-list');

    function saveTasks() {
        const tasks = Array.from(todoList.children).map(li => li.querySelector('span').textContent);
        localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function loadTasks() {
        const tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        tasks.forEach(taskText => addTodo(taskText));
    }

    function addTodo(taskText = todoInput.value) {
        const trimmedTaskText = taskText.trim();

        if (trimmedTaskText !== '') {
            const listItem = document.createElement('li');
            listItem.className = 'p-4 bg-gray-50 rounded-xl shadow-sm text-gray-800 flex items-center justify-between';
            
            const taskSpan = document.createElement('span');
            taskSpan.textContent = trimmedTaskText;

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'text-gray-400 hover:text-red-500 transition-colors duration-200';
            deleteBtn.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zm2.46-7.12l1.41-1.41L12 12.59l2.12-2.12 1.41 1.41L13.41 14l2.12 2.12-1.41 1.41L12 15.41l-2.12 2.12-1.41-1.41L10.59 14l-2.13-2.12zM15.5 4l-.5-1H9L8.5 4H5v2h14V4z"/>
                </svg>
            `;

            listItem.appendChild(taskSpan);
            listItem.appendChild(deleteBtn);

            todoList.appendChild(listItem);

            todoInput.value = '';

            saveTasks();
        }
    }

    addButton.addEventListener('click', () => addTodo());
    
    todoList.addEventListener('click', (e) => {
        if (e.target.closest('button')) {
            const listItem = e.target.closest('li');
            if (listItem) {
                listItem.remove();
                saveTasks();
            }
        }
    });

    todoInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            addTodo();
        }
    });

    loadTasks();
</script>

</body>
</html>
